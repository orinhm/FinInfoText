- name: fetch_yahoo_finance
  type: built-in
  description: 'Fetch comprehensive stock/equity data from Yahoo Finance: price history, company info, key financials, news
    headlines, and analyst recommendations. Works for any ticker supported by Yahoo Finance globally (e.g. ''NFGC.V'', ''TSLA'',
    ''AAPL'', ''GOLD'').'
  parameters:
  - ticker
  - days_back
  required_params:
  - ticker
- name: fetch_fred
  type: built-in
  description: 'Fetch macroeconomic data from FRED (Federal Reserve Economic Data). Covers 800,000+ series: GDP, CPI, unemployment,
    interest rates, gold price, oil price, housing, and more. You can specify series by common name (e.g. ''cpi'', ''gold_price'',
    ''fed_funds'', ''unemployment'') or by FRED ID (e.g. ''CPIAUCSL''). Alternatively, provide a search query to find relevant
    series.'
  parameters:
  - series
  - query
  - days_back
  required_params: []
